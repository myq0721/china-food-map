name: Promote Pending

on:
  workflow_dispatch:
    inputs:
      pending_ids:
        description: 'Pending IDs (comma-separated) or "all"'
        required: true
        type: string

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Promote pending submissions
        run: |
          IDS="${{ github.event.inputs.pending_ids }}"
          if [ "$IDS" = "all" ]; then
            node scripts/promote-pending.mjs --all
          else
            node scripts/promote-pending.mjs $(echo "$IDS" | tr ',' ' ')
          fi

      - name: Rebuild index
        run: node scripts/build-index.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/restaurants data/pending public/data/index.json
          git diff --staged --quiet || git commit -m "chore: promote pending submissions"
          git push
